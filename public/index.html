<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pandal Dashboard</title>
    <style>
        :root { --primary: #4361ee; --bg-color: #f4f7fe; --sidebar: #111c44; --text-dark: #2b3674; --text-light: #a3aed1; --card-bg: #ffffff; }
        body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg-color); display: flex; height: 100vh; }
        
        .sidebar { width: 250px; background: var(--sidebar); color: white; display: flex; flex-direction: column; padding: 20px 0; }
        .sidebar h2 { text-align: center; margin-bottom: 40px; color: white; letter-spacing: 1px; }
        .menu-item { padding: 15px 30px; color: var(--text-light); text-decoration: none; font-weight: 600; display: block; border-left: 4px solid transparent; transition: 0.3s; }
        .menu-item.active { background: rgba(255,255,255,0.1); color: white; border-left-color: var(--primary); }
        
        .main-content { flex: 1; padding: 30px; overflow-y: auto; }
        .header { margin-bottom: 20px; }
        .header h1 { margin: 0; color: var(--text-dark); font-size: 28px; }
        
        .card { background: var(--card-bg); border-radius: 15px; padding: 30px; box-shadow: 0 5px 14px rgba(0,0,0,0.05); }
        
        .tabs { display: flex; gap: 10px; margin-bottom: 25px; border-bottom: 2px solid #eef2ff; padding-bottom: 10px; }
        .tab { padding: 10px 20px; cursor: pointer; font-weight: bold; color: var(--text-light); border-radius: 8px; transition: 0.3s; }
        .tab.active { background: var(--primary); color: white; }
        .section { display: none; }
        .section.active { display: block; }

        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .form-group { margin-bottom: 20px; }
        .form-group.full-width { grid-column: 1 / -1; }
        
        label { display: block; font-weight: 600; margin-bottom: 8px; color: var(--text-dark); font-size: 14px; }
        input[type="text"], textarea, select { width: 100%; padding: 12px; border: 1px solid #e0e5f2; border-radius: 8px; box-sizing: border-box; background: #f4f7fe; color: var(--text-dark); font-family: inherit; transition: 0.3s; }
        input[type="text"]:focus, textarea:focus, select:focus { outline: none; border-color: var(--primary); background: white; }
        .coord-group { display: flex; gap: 15px; }
        
        .file-config { background: #eef2ff; padding: 20px; border-radius: 10px; margin-bottom: 25px; border: 1px solid #c7d2fe; display: flex; gap: 15px; align-items: center; }
        .file-config select, .file-config input { flex: 1; margin: 0; }
        
        .drop-zone { border: 2px dashed #a3aed1; border-radius: 10px; padding: 40px 20px; text-align: center; cursor: pointer; background: #fafbff; transition: 0.3s; }
        .drop-zone.dragover { background: #eef2ff; border-color: var(--primary); }
        .drop-zone span { color: var(--primary); font-weight: bold; font-size: 16px; display: block; margin-bottom: 10px;}
        
        .preview-gallery { display: flex; flex-wrap: wrap; gap: 15px; margin-top: 20px; }
        .preview-wrapper { position: relative; width: 100px; height: 100px; }
        .preview-gallery img { width: 100%; height: 100%; object-fit: cover; border-radius: 8px; border: 2px solid white; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .existing-badge { position: absolute; top: 0; left: 0; background: rgba(0,0,0,0.6); color: white; font-size: 10px; padding: 2px 5px; border-radius: 8px 0 8px 0; }
        
        button { background: var(--primary); color: white; border: none; padding: 14px 24px; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; width: 100%; margin-top: 10px; }
        button:hover { background: #324cdd; }
        
        .data-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .data-table th, .data-table td { padding: 12px; border-bottom: 1px solid #eef2ff; text-align: left; color: var(--text-dark); }
        .data-table th { background: #f4f7fe; font-weight: bold; }
        .btn-sm { padding: 6px 12px; font-size: 12px; margin-right: 5px; cursor: pointer; border:none; border-radius: 4px; color: white; width: auto; font-weight: normal;}
        .btn-edit { background: #f59e0b; }
        .btn-delete { background: #ef4444; }

        #status { margin-top: 20px; text-align: center; font-weight: bold; padding: 10px; border-radius: 8px; display: none; }
        .status-success { background: #d4edda; color: #155724; }
        .status-error { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>Dashboard</h2>
        <a href="#" class="menu-item active">Location System</a>
    </div>

    <div class="main-content">
        <div class="header"><h1 id="page-title">Location Management</h1></div>

        <div class="card">
            <div class="tabs">
                <div class="tab active" id="tab-add" onclick="switchTab('add')">Add / Edit Entry</div>
                <div class="tab" id="tab-manage" onclick="switchTab('manage')">Manage Data</div>
            </div>

            <div id="section-add" class="section active">
                <input type="hidden" id="edit-index" value="-1">
                
                <div class="file-config">
                    <div style="flex: 1;">
                        <label>Save to JSON File:</label>
                        <select id="json-select" onchange="toggleNewFileInput()"></select>
                    </div>
                    <div style="flex: 1; display: none;" id="new-file-wrapper">
                        <label>New File Name (e.g., north_kolkata):</label>
                        <input type="text" id="new-filename" placeholder="Enter file name...">
                    </div>
                </div>

                <div class="form-grid">
                    <div class="form-group">
                        <label>Pandal Name</label>
                        <input type="text" id="name" placeholder="Enter pandal name">
                    </div>

                    <div class="form-group">
                        <label>Google Maps Link</label>
                        <input type="text" id="link" placeholder="Paste link to extract coordinates" oninput="extractCoords()">
                    </div>

                    <div class="form-group full-width coord-group">
                        <div style="flex: 1;">
                            <label>Latitude</label>
                            <input type="text" id="lat" placeholder="Extracts automatically">
                        </div>
                        <div style="flex: 1;">
                            <label>Longitude</label>
                            <input type="text" id="lon" placeholder="Extracts automatically">
                        </div>
                    </div>

                    <div class="form-group full-width">
                        <label>Description / Review</label>
                        <textarea id="description" rows="4" placeholder="Enter detailed description here..."></textarea>
                    </div>

                    <div class="form-group full-width">
                        <label>Upload New Images (Appends to existing if editing)</label>
                        <div class="drop-zone" id="drop-zone">
                            <span>Click or Drag & Drop Images Here</span>
                            <input type="file" id="file-input" accept="image/*" multiple style="display: none;">
                        </div>
                        <div class="preview-gallery" id="preview-gallery"></div>
                    </div>
                </div>

                <button id="save-btn" onclick="saveData()">💾 Save Entry</button>
                <button id="cancel-edit-btn" onclick="cancelEdit()" style="display: none; background: #6c757d;">Cancel Edit</button>
                <div id="status"></div>
            </div>

            <div id="section-manage" class="section">
                <div class="file-config">
                    <div style="flex: 1;">
                        <label>Select JSON File to View/Edit:</label>
                        <select id="manage-json-select" onchange="loadTableData()"></select>
                    </div>
                </div>
                
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Pandal Name</th>
                            <th>Images</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="data-table-body">
                        <tr><td colspan="4" style="text-align:center;">Select a file to view data</td></tr>
                    </tbody>
                </table>
            </div>

        </div>
    </div>

    <script>
        let selectedFiles = [];
        let currentFileData = [];

        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById('tab-' + tab).classList.add('active');
            document.getElementById('section-' + tab).classList.add('active');

            if (tab === 'manage') loadJsonFilesForManage();
            else if (tab === 'add' && document.getElementById('edit-index').value === "-1") loadJsonFilesForAdd();
        }

        async function fetchJsonFiles() {
            try {
                const res = await fetch('/get-json-files');
                const data = await res.json();
                return data.files || [];
            } catch (err) { return []; }
        }

        async function loadJsonFilesForAdd() {
            const files = await fetchJsonFiles();
            const select = document.getElementById('json-select');
            select.innerHTML = '';
            files.forEach(file => { select.add(new Option(file, file)); });
            select.add(new Option("+ Create New JSON File...", "CREATE_NEW"));
            if (files.length === 0) select.value = "CREATE_NEW";
            toggleNewFileInput();
        }

        async function loadJsonFilesForManage() {
            const files = await fetchJsonFiles();
            const select = document.getElementById('manage-json-select');
            select.innerHTML = '<option value="">-- Select File --</option>';
            files.forEach(file => { select.add(new Option(file, file)); });
            document.getElementById('data-table-body').innerHTML = '<tr><td colspan="4" style="text-align:center;">Select a file to view data</td></tr>';
        }

        document.addEventListener("DOMContentLoaded", loadJsonFilesForAdd);

        function toggleNewFileInput() {
            const select = document.getElementById('json-select').value;
            document.getElementById('new-file-wrapper').style.display = select === 'CREATE_NEW' ? 'block' : 'none';
        }

        async function loadTableData() {
            const filename = document.getElementById('manage-json-select').value;
            const tbody = document.getElementById('data-table-body');
            
            if (!filename) {
                tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;">Select a file to view data</td></tr>';
                return;
            }

            tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;">Loading...</td></tr>';
            try {
                const res = await fetch(`/get-file-data?filename=${filename}`);
                const result = await res.json();
                
                if (result.success && result.data.length > 0) {
                    currentFileData = result.data;
                    tbody.innerHTML = '';
                    result.data.forEach((item, index) => {
                        const imgCount = item.local_images ? item.local_images.length : 0;
                        tbody.innerHTML += `
                            <tr>
                                <td>${index + 1}</td>
                                <td><strong>${item.name}</strong></td>
                                <td>${imgCount} image(s)</td>
                                <td>
                                    <button class="btn-sm btn-edit" onclick="editEntry('${filename}', ${index})">Edit</button>
                                    <button class="btn-sm btn-delete" onclick="deleteEntry('${filename}', ${index})">Delete</button>
                                </td>
                            </tr>
                        `;
                    });
                } else {
                    currentFileData = [];
                    tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;">No data found in this file.</td></tr>';
                }
            } catch (e) {
                tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; color:red;">Error loading data.</td></tr>';
            }
        }

        async function deleteEntry(filename, index) {
            if (confirm('Are you sure you want to delete this entry? This will also permanently delete the attached images.')) {
                const res = await fetch('/delete-data', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ filename, index })
                });
                const result = await res.json();
                if(result.success) loadTableData(); 
                else alert(result.message);
            }
        }

        function editEntry(filename, index) {
            const data = currentFileData[index];
            if (!data) return;

            document.getElementById('edit-index').value = index;
            document.getElementById('name').value = data.name || '';
            document.getElementById('link').value = data.source_url || '';
            document.getElementById('lat').value = data.latitude || '';
            document.getElementById('lon').value = data.longitude || '';
            document.getElementById('description').value = data.description || '';
            
            const jsonSelect = document.getElementById('json-select');
            jsonSelect.innerHTML = `<option value="${filename}">${filename}</option>`;
            jsonSelect.disabled = true;
            document.getElementById('new-file-wrapper').style.display = 'none';

            // Fetch and show existing images in the gallery
            previewGallery.innerHTML = '';
            if (data.local_images && data.local_images.length > 0) {
                data.local_images.forEach(imgPath => {
                    const wrapper = document.createElement('div');
                    wrapper.className = 'preview-wrapper';
                    
                    const img = document.createElement('img');
                    img.src = `/${imgPath}`; // Fetches the image from the local server
                    
                    const badge = document.createElement('span');
                    badge.className = 'existing-badge';
                    badge.innerText = 'Saved';
                    
                    wrapper.appendChild(img);
                    wrapper.appendChild(badge);
                    previewGallery.appendChild(wrapper);
                });
            }

            document.getElementById('save-btn').innerText = "🔄 Update Entry";
            document.getElementById('cancel-edit-btn').style.display = "block";
            
            switchTab('add');
        }

        function cancelEdit() {
            document.getElementById('edit-index').value = "-1";
            document.getElementById('name').value = '';
            document.getElementById('link').value = '';
            document.getElementById('lat').value = '';
            document.getElementById('lon').value = '';
            document.getElementById('description').value = '';
            
            document.getElementById('save-btn').innerText = "💾 Save Entry";
            document.getElementById('cancel-edit-btn').style.display = "none";
            
            const jsonSelect = document.getElementById('json-select');
            jsonSelect.disabled = false;
            loadJsonFilesForAdd();
            
            previewGallery.innerHTML = '';
            selectedFiles = [];
        }

        function extractCoords() {
            const link = document.getElementById('link').value;
            const latInput = document.getElementById('lat');
            const lonInput = document.getElementById('lon');
            const match = link.match(/!3d(-?\d+\.\d+)!4d(-?\d+\.\d+)/) || link.match(/@(-?\d+\.\d+),(-?\d+\.\d+)/);
            if (match) {
                latInput.value = match[1]; lonInput.value = match[2];
                latInput.style.background = "#e6f9ed"; lonInput.style.background = "#e6f9ed";
            }
        }

        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const previewGallery = document.getElementById('preview-gallery');

        dropZone.addEventListener('click', () => fileInput.click());
        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
        dropZone.addEventListener('drop', (e) => { e.preventDefault(); dropZone.classList.remove('dragover'); handleFiles(e.dataTransfer.files); });
        fileInput.addEventListener('change', (e) => handleFiles(e.target.files));

        function handleFiles(files) {
            Array.from(files).forEach(file => {
                if (file.type.startsWith('image/')) {
                    selectedFiles.push(file);
                    
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const wrapper = document.createElement('div');
                        wrapper.className = 'preview-wrapper';
                        
                        const img = document.createElement('img');
                        img.src = e.target.result;
                        
                        const badge = document.createElement('span');
                        badge.className = 'existing-badge';
                        badge.style.background = '#28a745';
                        badge.innerText = 'New';

                        wrapper.appendChild(img);
                        wrapper.appendChild(badge);
                        previewGallery.appendChild(wrapper);
                    };
                    reader.readAsDataURL(file);
                }
            });
        }

        async function saveData() {
            const statusBox = document.getElementById('status');
            const selectValue = document.getElementById('json-select').value;
            let targetFilename = selectValue === 'CREATE_NEW' ? document.getElementById('new-filename').value : selectValue;
            const editIndex = document.getElementById('edit-index').value;

            if (!targetFilename) return showStatus("Please provide a JSON file name!", "error");
            if (!document.getElementById('link').value) return showStatus("Google Maps Link is required!", "error");

            statusBox.style.display = "block";
            statusBox.className = "";
            statusBox.innerText = "Processing...";

            const formData = new FormData();
            formData.append('filename', targetFilename);
            formData.append('name', document.getElementById('name').value);
            formData.append('link', document.getElementById('link').value);
            formData.append('lat', document.getElementById('lat').value);
            formData.append('lon', document.getElementById('lon').value);
            formData.append('description', document.getElementById('description').value);
            formData.append('editIndex', editIndex); 
            
            selectedFiles.forEach(file => formData.append('images', file));

            try {
                const response = await fetch('/save-data', { method: 'POST', body: formData });
                const result = await response.json();
                
                if (result.success) {
                    showStatus(result.message, "success");
                    setTimeout(() => {
                        cancelEdit(); 
                        statusBox.style.display = "none";
                    }, 2000);
                } else {
                    showStatus(result.message, "error");
                }
            } catch (error) {
                showStatus("Server Error!", "error");
            }
        }

        function showStatus(message, type) {
            const statusBox = document.getElementById('status');
            statusBox.style.display = "block";
            statusBox.innerText = message;
            statusBox.className = type === "success" ? "status-success" : "status-error";
        }
    </script>
</body>
</html>
